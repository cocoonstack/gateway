# Reverse-proxy / load balancer for a fleet of gw instances.
# Key points: SSE needs buffering off; realtime WebSocket needs the upgrade
# headers and long timeouts; health checks hit /health.

upstream gateway {
    # add one line per gw instance
    server 10.0.0.11:8080 max_fails=3 fail_timeout=10s;
    server 10.0.0.12:8080 max_fails=3 fail_timeout=10s;
    server 10.0.0.13:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;

    # Streaming (SSE) and long LLM calls: don't buffer, don't time out early.
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    location /v1/ {
        proxy_pass http://gateway;
    }

    # Batch polling needs the submitting instance when the store is local
    # (memory/sqlite). With a Postgres store any instance answers — drop this.
    # upstream gateway_batches { ip_hash; server 10.0.0.11:8080; ... }
    # location /v1/batches { proxy_pass http://gateway_batches; }

    # Realtime WebSocket: needs the Upgrade dance. A WS connection naturally
    # pins to one instance for its lifetime, so no session store is required.
    location /v1/realtime {
        proxy_pass http://gateway;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Health/introspection. /metrics is better scraped per-instance by
    # Prometheus (service discovery) than through the LB.
    location = /health {
        proxy_pass http://gateway;
        access_log off;
    }

    # Operator introspection (ledger/accounts) — not a tenant surface.
    # Restrict to the operator network; adjust the CIDR to yours.
    location /internal/ {
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://gateway;
    }
}
