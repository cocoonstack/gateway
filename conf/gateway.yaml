# gw — gateway config.
# This file is the config source for a single node. With storage.postgres_url
# set, the Postgres config store becomes the fleet source of truth: this file
# only seeds an empty store, and updates flow through PUT /admin/config.

listen:
  host: 127.0.0.1
  port: 8080

# Durable records (billing ledger, files, batches). Empty/absent = in-memory;
# sqlite persists on one node; postgres shares config/keys/records across a
# fleet (and redis_url shares rate/quota counters + account health).
# storage:
#   sqlite_path: /var/lib/gw/store.db
#   postgres_url: postgres://gw:secret@db.internal/gw
#   redis_url: redis://cache.internal:6379

# Dynamic-config admin surface (SIGHUP / POST /admin/reload, key CRUD).
# Disabled unless token_env names an env var holding a bearer token. Keep it on
# a private network.
# admin:
#   token_env: GW_ADMIN_TOKEN

# AK auth table (local key-table version)
access_keys:
  - ak: ak-demo-123
    product: demo
    qps: 100
    daily_token_quota: 1000000
  - ak: ak-limited # e2e: rate-limit path (qps=1 → second immediate call is limited)
    product: demo
    qps: 1
    daily_token_quota: 1000000
  - ak: ak-tiny-quota # e2e: quota path (first call consumes it, second is rejected)
    product: demo
    qps: 100
    daily_token_quota: 1
  - ak: ak-bench # local benchmark: effectively unthrottled
    product: bench
    qps: 1000000
    daily_token_quota: 1000000000
  - ak: ak-tpm-tiny # e2e: TPM path (first consume succeeds, second is rejected within the window)
    product: demo
    qps: 100
    daily_token_quota: 1000000
    tokens_per_minute: 10
  - ak: ak-prod-limited # e2e: product-level QPM (product=qpmprod, 2 per minute)
    product: qpmprod
    qps: 100
    daily_token_quota: 1000000
  - ak: ak-acme-1 # e2e: tenant entitlement + pooled tenant rate (tenant=acme)
    tenant: acme
    product: demo
    qps: 100
    daily_token_quota: 1000000
  - ak: ak-acme-2 # e2e: second key sharing acme's pooled rate bucket
    tenant: acme
    product: demo
    qps: 100
    daily_token_quota: 1000000
  - ak: ak-banned # e2e: banned key -> distinct 403
    product: demo
    qps: 100
    daily_token_quota: 1000000
    banned: true
  - ak: ak-expired # e2e: expired key -> distinct 403
    product: demo
    qps: 100
    daily_token_quota: 1000000
    expires_at_epoch_secs: 1
  - ak: ak-beta-1 # e2e: (AK,model) quota + fallback degrade (tenant=beta)
    tenant: beta
    product: demo
    qps: 100
    daily_token_quota: 1000000

# Tenants: pooled rate limits + model entitlement. Keys without a tenant join
# the implicit unrestricted `default` tenant.
tenants:
  - name: acme # e2e: entitled to gpt-4o only; both acme keys share qps 2
    qps: 2
    models: [gpt-4o]
  - name: beta # e2e: gpt-4o capped at 20 tokens/day per key, degrades to gpt-4o-mini
    model_quotas:
      gpt-4o: 20
    fallback_model: gpt-4o-mini
    model_prices: # e2e: tenant pays a premium over the list price
      gpt-4o: {input_price_per_1k_micros: 5000, output_price_per_1k_micros: 20000}

# Public model name → wire protocol, optional provider binding (only that
# provider's accounts serve the model), plus demo prices (micros per 1k tokens).
models:
  - name: gpt-4o
    protocol: openai-chat
    provider: openai
    input_price_per_1k_micros: 2500
    output_price_per_1k_micros: 10000
  - name: gpt-4o-mini
    protocol: openai-chat
    provider: openai
    input_price_per_1k_micros: 150
    output_price_per_1k_micros: 600
  - name: claude-sonnet
    protocol: anthropic-messages
    input_price_per_1k_micros: 3000
    output_price_per_1k_micros: 15000
  - name: gemini-pro
    protocol: gemini
    input_price_per_1k_micros: 1250
    output_price_per_1k_micros: 5000
  - name: text-embedding-3 # embeddings family
    protocol: embeddings
    input_price_per_1k_micros: 20
    output_price_per_1k_micros: 0
  - name: dall-e-3 # image family
    protocol: image
  - name: tts-1 # audio tts family
    protocol: tts
  - name: whisper-1 # audio stt family
    protocol: stt
  - name: kling-video # video family
    protocol: video
  - name: brave-search # search family
    protocol: search
  - name: hunyuan-lite # e2e: PTU failover (ptu account down -> paygo spillover)
    protocol: openai-chat
    provider: tencent
    input_price_per_1k_micros: 100
    output_price_per_1k_micros: 100
  - name: ernie-4.0 # bespoke wire: Baidu ERNIE
    protocol: ernie
    input_price_per_1k_micros: 300
    output_price_per_1k_micros: 900
  - name: qpm-mini # e2e: model-level QPM limit (2 per minute)
    protocol: openai-chat
    provider: openai
    qpm: 2
  - name: cached-mini # e2e: request-level cache (TTL 60s, hits aren't billed)
    protocol: openai-chat
    provider: openai
    input_price_per_1k_micros: 150
    output_price_per_1k_micros: 600
    cache_ttl_seconds: 60
  - name: spark-lite # e2e: account cooldown (sole account stays down -> cooldown -> recovers on expiry)
    protocol: openai-chat
    provider: iflytek
  - name: erroring-model # e2e: vendor returns an error envelope -> client gets the mapped error status
    protocol: openai-chat
    provider: flaky
  - name: qwen-max # bespoke wire: Alibaba DashScope native (not the openai-compatible mode)
    protocol: dashscope
    input_price_per_1k_micros: 400
    output_price_per_1k_micros: 1200
  - name: gpt-5-responses # OpenAI Responses API (/v1/responses, not the chat shape)
    protocol: responses
    provider: openai
    input_price_per_1k_micros: 1250
    output_price_per_1k_micros: 10000
  - name: gpt-3.5-turbo-instruct # legacy text completion (/v1/completions, prompt shape)
    protocol: completions
    provider: openai
    input_price_per_1k_micros: 1500
    output_price_per_1k_micros: 2000

# Upstream account slots (mock credentials; set endpoint + api_key_env to go live).
# tier: ptu = provisioned throughput (preferred), paygo/default = pay-as-you-go. An
# account whose name contains "down" is simulated by MockTransport as an upstream
# 503, for failover testing.
accounts:
  - name: mock-openai-1
    provider: openai
    priority: 1
    cost_input_price_per_1k_micros: 100 # e2e: margin accounting (vendor cost)
    cost_output_price_per_1k_micros: 400
    protocols: ["openai-chat", "completions"]
  - name: mock-openai-2
    provider: openai
    priority: 2
    protocols: ["openai-chat"]
  - name: mock-anthropic-1
    provider: anthropic
    priority: 1
    protocols: ["anthropic-messages"]
  - name: mock-vertex-1
    provider: google
    priority: 1
    protocols: ["gemini"]
  - name: mock-embed-1
    provider: openai
    priority: 1
    protocols: ["embeddings"]
  - name: mock-image-1
    provider: openai
    priority: 1
    protocols: ["image"]
  - name: mock-audio-1
    provider: openai
    priority: 1
    protocols: ["tts", "stt"]
  - name: mock-video-1
    provider: kling
    priority: 1
    protocols: ["video"]
  - name: mock-search-1
    provider: brave
    priority: 1
    protocols: ["search"]
  - name: mock-responses-1 # OpenAI Responses API surface
    provider: openai
    priority: 1
    protocols: ["responses"]
  - name: mock-realtime-1 # e2e: the account exists but the realtime engine returns 501 by design
    provider: azure
    priority: 1
    protocols: ["realtime"]
  - name: mock-hunyuan-ptu-down # e2e: PTU account (simulated down)
    provider: tencent
    priority: 1
    tier: ptu
    protocols: ["openai-chat"]
  - name: mock-hunyuan-paygo # e2e: paygo fallback account
    provider: tencent
    priority: 1
    tier: paygo
    protocols: ["openai-chat"]
  - name: mock-ernie-1 # bespoke wire e2e
    provider: baidu
    priority: 1
    protocols: ["ernie"]
  - name: mock-spark-down # e2e: sole account stays down -> consecutive failures trigger cooldown
    provider: iflytek
    priority: 1
    protocols: ["openai-chat"]
  - name: mock-erroring # e2e: vendor error envelope (name containing "erroring" triggers the mock)
    provider: flaky
    priority: 1
    protocols: ["openai-chat"]
  - name: mock-dashscope-1 # bespoke wire e2e
    provider: alibaba
    priority: 1
    protocols: ["dashscope"]

# Local security policy (rule-based; no cloud security service)
security:
  dlp_redact: true
  blocklist:
    - forbiddenword

# Account stability: 3 consecutive failures enter a 2s cooldown (e2e uses a short cooldown)
stability:
  failure_threshold: 3
  cooldown_seconds: 2

# Product-level governance
products:
  - name: qpmprod
    qpm: 2
