name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  gw:
    strategy:
      matrix:
        include:
          - {runner: ubuntu-latest, os: linux, arch: amd64}
          - {runner: ubuntu-24.04-arm, os: linux, arch: arm64}
          - {runner: macos-15-intel, os: darwin, arch: amd64}
          - {runner: macos-latest, os: darwin, arch: arm64}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and package gw
        run: |
          cargo build --release -p gw-server --locked
          mkdir -p dist-gw
          tar -czf "dist-gw/gw_${GITHUB_REF_NAME#v}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" \
            -C target/release gw
      - uses: actions/upload-artifact@v7
        with:
          name: gw-${{ matrix.os }}-${{ matrix.arch }}
          path: dist-gw/*.tar.gz

  release:
    needs: gw
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: control-plane/go.mod
          cache-dependency-path: control-plane/go.sum
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: control-plane/web/package-lock.json
      - name: Build and package web assets
        working-directory: control-plane/web
        run: |
          npm ci
          npm run build
          mkdir -p ../../dist-web
          tar -czf "../../dist-web/control-plane-web-dist_${GITHUB_REF_NAME#v}.tar.gz" -C . dist
      - uses: actions/download-artifact@v8
        with:
          path: dist-gw
          merge-multiple: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
