name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p ap-server --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          bin=target/${{ matrix.target }}/release/ap
          out=ap-${{ matrix.target }}
          cp "$bin" "$out"
          sha256sum "$out" > "$out.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ap-${{ matrix.target }}
            ap-${{ matrix.target }}.sha256
