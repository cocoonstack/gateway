name: Docker

# Multi-arch image builds compile the Rust release for arm64 under QEMU, which
# is slow — so build+push only on version tags, not every push. Main pushes are
# covered by the CI workflow.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/metadata-action@v6
        id: meta-cp
        with:
          images: ghcr.io/${{ github.repository }}-control-plane
      - uses: docker/build-push-action@v7
        with:
          context: control-plane
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cp.outputs.tags }}
          labels: ${{ steps.meta-cp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
