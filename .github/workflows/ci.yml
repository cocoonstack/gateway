name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    # Real backing services so the Postgres/Redis integration tests (gated on
    # GW_TEST_PG_URL / GW_TEST_REDIS_URL) actually execute in CI instead of
    # silently self-skipping.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: gwtest
          POSTGRES_DB: gw
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      GW_TEST_PG_URL: postgres://postgres:gwtest@127.0.0.1:5432/gw
      GW_TEST_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Run cargo-deny directly (pinned) rather than the action, whose musl
      # container mis-resolves rust-toolchain.toml and tracks a floating CLI.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.20.2
      - uses: Swatinem/rust-cache@v2
      - run: cargo deny check
